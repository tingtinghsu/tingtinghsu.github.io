# Setup
title: Ting's Square 
description: A web developer who loves bridging the gap between product ideation and implementation
url: https://tingtinghsu.github.io
avatar: /avatar.jpeg
paginate: 5
permalink: pretty
future: true
# cover_image: /bg.jpeg

# Gems
plugins:
  - jekyll-gist
  - jekyll-paginate
  - jekyll-seo-tag
  - jekyll-feed
  - jekyll-sitemap

# Optimize Jekyll
exclude:
  - .editorconfig
  - .git
  - .jekyll-cache
  - Gemfile
  - Gemfile.lock
  - LICENSE.md
  - README.md
  - scripts/
  - not-pure-poole.gemspec

# Optimize Jekyl SEO Tag
twitter:
  username: tingtingtour
  card: summary
logo: logo.png
social:
  name: Ting Ting Hsu
  links:
    - https://twitter.com/tingtingtour
    - https://github.com/tingtinghsu
    - https://tingtingtour.wordpress.com/
google_site_verification: xxxxx
lang: en

sass:
  sass_dir: _sass
  style: :compressed

# Options

# Replace this value and uncomment to enable Google Analytics tracking
# google_analytics: UA-000000-0

# Replace this value and uncomment to enable Disqus
# disqus: xxxxxx

# Specify the author for blog posts
author:
  name: Ting Hsu
  url: https://github.com/tingtinghsu/
